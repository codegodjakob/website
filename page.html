<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Jakob Schlenker — Under Construction</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon-circle.ico?v=8" sizes="any" />
<link rel="shortcut icon" href="/favicon-circle.ico?v=8" />
<link rel="icon" type="image/svg+xml" href="/favicon-circle.svg?v=8" />
<link rel="icon" type="image/png" href="/favicon-circle-16x16.png?v=8" sizes="16x16" />
<link rel="icon" type="image/png" href="/favicon-circle-32x32.png?v=8" sizes="32x32" />
<link rel="apple-touch-icon" href="/apple-touch-icon-circle.png?v=8" />

<style>
  :root {
    --bg: #fafaf9;
    --ink: #09090b;
    --muted: #71717a;
    --rule: #27272a;
    --accent: #166534;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #09090b; --ink: #fafaf9; --muted: #a1a1aa; --rule: #d4d4d8; --accent: #4ade80; }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 48px 24px;
  }
  .stack {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 28px;
  }
  .label {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink);
  }
  .rule {
    width: 24px;
    height: 1px;
    background: var(--rule);
    opacity: 0.3;
  }
  h1 {
    margin: 0;
    font-size: clamp(24px, 3.4vw, 34px);
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1.25;
    text-wrap: balance;
  }
  .contact {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.55;
    max-width: 44ch;
  }
  .contact a {
    color: var(--ink);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
    transition: color 0.15s;
  }
  .contact a:hover { color: var(--accent); }

  canvas#waves {
    display: block;
    width: min(440px, 78vw);
    height: min(440px, 78vw);
    background: transparent;
  }
</style>
</head>
<body>

  <div class="stack">
    <canvas id="waves" aria-hidden="true"></canvas>
    <h1>The site is getting redesigned.<br>Come back soon.</h1>
    <p class="contact">
      Please feel free to reach out<br>
      <a href="mailto:jakob.schlenker@gmail.com">jakob.schlenker@gmail.com</a>
    </p>
  </div>

<script>
// Contour-wave meditation — sparse spiral sources, slow drift.
(() => {
  const canvas = document.getElementById('waves');
  const ctx = canvas.getContext('2d', { alpha: true });
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const SIZE = 550;
  canvas.width = SIZE * DPR;
  canvas.height = SIZE * DPR;
  ctx.scale(DPR, DPR);

  const width = SIZE, height = SIZE;
  const resolution = 4;
  const rows = Math.floor(height / resolution);
  const cols = Math.floor(width / resolution);

  const inkColor = getComputedStyle(document.documentElement).getPropertyValue('--ink').trim() || '#09090b';

  const sources = [];
  const pointsPerSpiral = 5;
  for (let i = 0; i < pointsPerSpiral; i++) {
    const t = i / pointsPerSpiral;
    const angle = t * 2 * Math.PI * 1.5;
    const radius = 100 + t * 150;
    sources.push({
      x: width/2 + Math.cos(angle) * radius,
      y: height/2 + Math.sin(angle) * radius,
      wavelength: 60 + t * 30,
      phase: angle,
      amplitude: 1.0
    });
  }
  sources.push({ x: width/2, y: height/2, wavelength: 80, phase: 0, amplitude: 1.5 });

  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const field = new Float32Array(rows * cols);
  const targetFPS = 20;
  const frameInterval = 1000 / targetFPS;
  let time = 0, lastFrameTime = 0;

  function render() {
    ctx.clearRect(0, 0, width, height);

    for (let i = 0; i < rows; i++) {
      for (let j = 0; j < cols; j++) {
        const x = j * resolution, y = i * resolution;
        let amp = 0;
        for (let s = 0; s < sources.length; s++) {
          const src = sources[s];
          const dx = x - src.x, dy = y - src.y;
          const d = Math.sqrt(dx*dx + dy*dy);
          const falloff = Math.exp(-d / 250);
          amp += src.amplitude * falloff * Math.sin((d / src.wavelength - time) * 2 * Math.PI + src.phase);
        }
        field[i * cols + j] = amp;
      }
    }

    ctx.strokeStyle = inkColor;
    ctx.lineWidth = 1.1;
    ctx.beginPath();

    const levels = [-0.2, 0.2];
    for (const level of levels) {
      for (let i = 0; i < rows - 1; i++) {
        for (let j = 0; j < cols - 1; j++) {
          const idx = i * cols + j;
          const x = j * resolution, y = i * resolution;
          const v00 = field[idx] > level;
          const v10 = field[idx + 1] > level;
          const v11 = field[idx + cols + 1] > level;
          const v01 = field[idx + cols] > level;
          if (v00 !== v10) { ctx.moveTo(x + resolution/2, y); ctx.lineTo(x + resolution, y + resolution/2); }
          if (v10 !== v11) { ctx.moveTo(x + resolution, y + resolution/2); ctx.lineTo(x + resolution/2, y + resolution); }
          if (v11 !== v01) { ctx.moveTo(x + resolution/2, y + resolution); ctx.lineTo(x, y + resolution/2); }
          if (v01 !== v00) { ctx.moveTo(x, y + resolution/2); ctx.lineTo(x + resolution/2, y); }
        }
      }
    }
    ctx.stroke();
  }

  function tick(now) {
    if (!lastFrameTime) lastFrameTime = now;
    if (now - lastFrameTime >= frameInterval) {
      lastFrameTime = now - ((now - lastFrameTime) % frameInterval);
      render();
      if (!reduced) time += 0.00075;
    }
    requestAnimationFrame(tick);
  }
  render();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
